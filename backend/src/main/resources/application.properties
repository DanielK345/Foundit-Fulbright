# Server
server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/founditdb
spring.datasource.username=admin
spring.datasource.password=Pkd@0604psql
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=REDACTED_CHANGE_JWT_SECRET_IN_ENV
app.jwt.expiration-ms=86400000

# Mail (configure with real Gmail App Password for actual email sending)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-gmail-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File uploads
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Async
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
