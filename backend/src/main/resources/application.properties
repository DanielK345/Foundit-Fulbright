# Set DATABASE_URL to the full JDBC connection string, e.g.:
#   jdbc:postgresql://host.neon.tech/founditdb?sslmode=require  (Neon)
#   jdbc:postgresql://localhost:5432/founditdb                   (local)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/founditdb}
spring.datasource.driver-class-name=org.postgresql.Driver
# DB_USERNAME / DB_PASSWORD are extracted from the Neon connection details
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# dialect is auto-detected by Hibernate; no need to set it explicitly

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Set to your Vercel URL in production, e.g. https://foundit.vercel.app
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}

app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.com.foundit=INFO
logging.level.org.springframework.security=WARN

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Render injects PORT; falls back to 8085 for local dev
server.port=${PORT:8085}
