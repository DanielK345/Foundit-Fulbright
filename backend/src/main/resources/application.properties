# Set DATABASE_URL to the full JDBC connection string, e.g.:
#   jdbc:postgresql://user:pass@host.neon.tech/founditdb?sslmode=require  (Neon, credentials embedded)
#   jdbc:postgresql://localhost:5432/founditdb                              (local)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/founditdb}
spring.datasource.driver-class-name=org.postgresql.Driver
# If credentials are embedded in DATABASE_URL these can be omitted from Render env vars
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=${JWT_SECRET:CHANGE_ME_SET_JWT_SECRET_ENV_VAR}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Set to your Vercel URL in production, e.g. https://foundit.vercel.app
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}

app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Temporarily verbose to expose startup errors on Render
logging.level.com.foundit=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:noreply@example.com}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Render injects PORT; falls back to 8085 for local dev
server.port=${PORT:8085}
